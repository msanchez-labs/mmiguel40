name: Generate snake animation
on:
  schedule:
    - cron: "0 */12 * * *"  # cada 12 horas
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  generate:
    name: Generate animated snake
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake from GitHub contributions
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: mmiguel40
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00BFA5&color_dots=#0D1117,#1B4332,#2D6A4F,#52B788,#95D5B2

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
